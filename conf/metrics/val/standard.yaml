      eval_on: context
      metric_fn:
        _target_: utils.experiment.metrics.functions.log_likelihood
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskStdAccumulator
    - _target_: utils.experiment.metrics.MetricSpec
      name: rmse
      eval_on: context
      metric_fn:
        _target_: utils.experiment.metrics.functions.squared_error
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskRMSEAccumulator
      step_reducer:
        _target_: utils.experiment.metrics.RMSEStepReducer
    - _target_: utils.experiment.metrics.MetricSpec
      name: crps
      eval_on: context
      metric_fn:
        _target_: utils.experiment.metrics.functions.gaussian_crps_closed_form
        _partial_: true
      accumulator:
