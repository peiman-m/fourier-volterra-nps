# @package phase_configs.validation
#
# Validation PhaseConfig preset for synthetic benchmarks. Mirrors
# ``standard.yaml`` plus a ``gt_loglik`` spec on the query
# PhaseConfig — synthetic batches carry ``batch.gt_pred`` (a
# ``GroundTruthPredictor``) which ``gt_log_likelihood`` reads. Attach
# this preset only to synthetic experiments; ``gt_log_likelihood``
# raises ``NotImplementedError`` on any batch without ``gt_pred``.
#
# Aggregation is *task-weighted* (mirrors ``test/synthetic.yaml``): each metric
# is reduced per task (mean over that task's points) and averaged across tasks,
# with a companion ``*_std`` spec for the population std across tasks. RMSE uses
# ``TaskRMSEAccumulator`` and carries no ``*_std`` spec.

- _target_: utils.experiment.PhaseConfig
  name: "query"
  metric_specs:
    - _target_: utils.experiment.metrics.MetricSpec
      name: loglik
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.log_likelihood
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskMeanAccumulator
      step_reducer:
        _target_: utils.experiment.metrics.MeanReducer
    - _target_: utils.experiment.metrics.MetricSpec
      name: loglik_std
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.log_likelihood
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskStdAccumulator
    - _target_: utils.experiment.metrics.MetricSpec
      name: rmse
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.squared_error
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskRMSEAccumulator
      step_reducer:
        _target_: utils.experiment.metrics.RMSEStepReducer
    - _target_: utils.experiment.metrics.MetricSpec
      name: crps
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.gaussian_crps_closed_form
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskMeanAccumulator
      step_reducer:
        _target_: utils.experiment.metrics.MeanReducer
    - _target_: utils.experiment.metrics.MetricSpec
      name: crps_std
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.gaussian_crps_closed_form
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskStdAccumulator
    - _target_: utils.experiment.metrics.MetricSpec
      name: gt_loglik
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.gt_log_likelihood
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskMeanAccumulator
      step_reducer:
        _target_: utils.experiment.metrics.MeanReducer
    - _target_: utils.experiment.metrics.MetricSpec
      name: gt_loglik_std
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.gt_log_likelihood
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskStdAccumulator
- _target_: utils.experiment.PhaseConfig
