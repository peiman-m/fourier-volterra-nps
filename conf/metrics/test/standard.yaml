# @package phase_configs.test
#
# Test PhaseConfig preset for benchmarks without a ground-truth
# predictor. Mirrors ``conf/metrics/val/standard.yaml`` — kept as a
# separate file so the val/test cadence can diverge per benchmark.
#
# Aggregation is *task-weighted*: each metric is reduced per task (mean over
# that task's points) and averaged across tasks, with a companion ``*_std``
# spec reporting the population std across tasks (the task-level error bar).
# RMSE uses ``TaskRMSEAccumulator`` (mean over tasks of each task's
# ``sqrt(mean SE)``) and carries no ``*_std`` spec — a per-task-RMSE std would
# need its own sqrt-aware accumulator; use cross-seed std for RMSE error bars.

- _target_: utils.experiment.PhaseConfig
  name: "query"
  metric_specs:
    - _target_: utils.experiment.metrics.MetricSpec
      name: loglik
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.log_likelihood
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskMeanAccumulator
      step_reducer:
        _target_: utils.experiment.metrics.MeanReducer
    - _target_: utils.experiment.metrics.MetricSpec
      name: loglik_std
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.log_likelihood
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskStdAccumulator
    - _target_: utils.experiment.metrics.MetricSpec
      name: rmse
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.squared_error
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskRMSEAccumulator
      step_reducer:
        _target_: utils.experiment.metrics.RMSEStepReducer
    - _target_: utils.experiment.metrics.MetricSpec
      name: crps
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.gaussian_crps_closed_form
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskMeanAccumulator
      step_reducer:
        _target_: utils.experiment.metrics.MeanReducer
    - _target_: utils.experiment.metrics.MetricSpec
      name: crps_std
      eval_on: query
      metric_fn:
        _target_: utils.experiment.metrics.functions.gaussian_crps_closed_form
        _partial_: true
      accumulator:
        _target_: utils.experiment.metrics.TaskStdAccumulator
