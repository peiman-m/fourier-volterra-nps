# @package _global_
#
# Shared base for the synthetic benchmark. The ``optimizer:`` block
# lives separately in ``conf/optimizer/adamw.yaml``. Uses YAML anchors
# (``&shared_dataset_configs``); OmegaConf honors YAML 1.1 merge keys.

data:
  datasets:
    _shared_dataset_configs: &shared_dataset_configs
      dim: ${params.x_dim}
      min_nc: 5
      max_nc: 50
      batch_size: 64
      drop_last: false

    train:
      _target_: utils.data.SyntheticDataset
      min_nq: 5
      max_nq: 50
      samples_per_epoch: 16_000
      input_generator: ${input_generators.train}
      output_generator: ${output_generators.train}
      <<: *shared_dataset_configs

    validation:
      _target_: utils.data.SyntheticDataset
      min_nq: 128
      max_nq: 128
      samples_per_epoch: 8000
      deterministic: true
      deterministic_seed: 2025
      input_generator: ${input_generators.validation}
      output_generator: ${output_generators.validation}
      <<: *shared_dataset_configs

    test:
      _target_: utils.data.SyntheticDataset
      min_nq: 128
      max_nq: 128
      samples_per_epoch: 64_000
      deterministic: true
      deterministic_seed: 2026
      input_generator: ${input_generators.test}
      output_generator: ${output_generators.test}
      <<: *shared_dataset_configs

plot_fn:
  _target_: utils.plot_fn.SyntheticPlotter
  xc_range_eval: ${input_generators.validation.context_range}
  xq_range_eval: ${input_generators.validation.query_range}
  xc_range_train: ${input_generators.train.context_range}
  xq_range_train: ${input_generators.train.query_range}
  figsize: [5.0, 4.0]
  y_lim: [-3.0, 3.0]
  points_per_unit: 64
  savefig: false
  show_plots: false
  logging: true

setconv_grid_params:
  resolution: ${eval:'1.0 / 64.0'}
  margin: 0.1
  multiple_of: 64
  init_lengthscale: ${eval:'2 * ${.resolution}'}

params:
  x_dim: 1
  y_dim: 1

misc:
  experiment_name: ${.output_generator}
  model_run_name: ${model_name}-seed=${.seed}

  wandb_logging_enabled: true
  wandb_user: your-wandb-entity
  project: FVNP-${.experiment_name}-x=${params.x_dim}d-y=${params.y_dim}d
  name: ${.model_run_name}
  eval_name: ${.name}_eval
  hardware_callback: true

  checkpointing:
    local: true
    wandb: false
    save_weights_only: true
    enable_version_counter: false
    resume_from: null
    save_last: true
    save_periodic_every_n_epochs: null
    best:
      monitor: "validation_query_loglik_epoch"
      mode: "max"
      save_top_k: 1

  default_lightning_logger: false

  artifacts_dir: artifacts/${.experiment_name}/x=${params.x_dim}d_y=${params.y_dim}d/model=${model_name}/seed=${.seed}
  checkpoint_dirpath: ${.artifacts_dir}/checkpoints
  metrics_dirpath: ${.artifacts_dir}/metrics
  plots_dirpath: ${.artifacts_dir}/plots

  num_plots: 6
  plot_interval: 10
  plot_fn: ${plot_fn}

  lr_scheduler:
    enabled: true
    t_max: ${misc.epochs}
    eta_min: 1.0e-6

  seed: 0
  epochs: 250
  check_validation_every_n_epoch: 1
  enable_progress_bar: true
  gradient_clip_val: 0.5
