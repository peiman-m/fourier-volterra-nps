# @package _global_
# Translation-shift eval variant: inherits the full uniform generator and shifts
# the validation/test ranges to [6, 12] (train stays [-3, 3]). Only the changed
# fields are overridden; samplers/_target_ are inherited from uniform.
defaults:
  - uniform
  - _self_

input_generators:
  validation:
    context_range: [6.0, 12.0]
    query_range: [6.0, 12.0]
  test:
    context_range: [6.0, 12.0]
    query_range: [6.0, 12.0]

misc:
  input_generator:
    eval: uniform-shift-9
